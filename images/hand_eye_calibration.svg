<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="480" fill="#0f1923" rx="12"/>
  <text x="450" y="28" text-anchor="middle" fill="#e0f0ff" font-size="15" font-weight="bold">手眼标定两种配置</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64b5f6"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef9a9a"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a5d6a7"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ffb74d"/></marker>
  </defs>

  <!-- LEFT: Eye-in-Hand -->
  <rect x="20" y="44" width="415" height="390" rx="10" fill="#0d1f33" stroke="#2196F3" stroke-width="2"/>
  <text x="227" y="68" text-anchor="middle" fill="#64b5f6" font-size="13" font-weight="bold">Eye-in-Hand（随动式）</text>
  <text x="227" y="83" text-anchor="middle" fill="#546e7a" font-size="10">相机安装在末端执行器上，随机械臂一起运动</text>

  <!-- Robot Base L -->
  <rect x="155" y="335" width="90" height="32" rx="5" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="200" y="356" text-anchor="middle" fill="#e3f2fd" font-size="10" font-weight="bold">Base W</text>

  <!-- Arm L -->
  <line x1="200" y1="335" x2="243" y2="265" stroke="#64b5f6" stroke-width="4" stroke-linecap="round"/>
  <circle cx="243" cy="265" r="5" fill="#42a5f5"/>
  <line x1="243" y1="265" x2="292" y2="205" stroke="#64b5f6" stroke-width="4" stroke-linecap="round"/>

  <!-- End-Effector L -->
  <rect x="270" y="186" width="56" height="26" rx="4" fill="#0d47a1" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="298" y="203" text-anchor="middle" fill="#bbdefb" font-size="9" font-weight="bold">End-Eff E</text>

  <!-- Camera on End-Eff L -->
  <rect x="310" y="164" width="60" height="26" rx="4" fill="#1b5e20" stroke="#66bb6a" stroke-width="2"/>
  <text x="340" y="179" text-anchor="middle" fill="#c8e6c9" font-size="9" font-weight="bold">Camera C</text>
  <text x="340" y="189" text-anchor="middle" fill="#c8e6c9" font-size="7">（固定在末端）</text>

  <!-- Calibration Target L fixed on table -->
  <rect x="62" y="283" width="72" height="55" rx="4" fill="#263238" stroke="#90a4ae" stroke-width="1.5"/>
  <rect x="67" y="289" width="10" height="10" fill="#eceff1"/><rect x="77" y="289" width="10" height="10" fill="#37474f"/>
  <rect x="87" y="289" width="10" height="10" fill="#eceff1"/><rect x="97" y="289" width="10" height="10" fill="#37474f"/>
  <rect x="67" y="299" width="10" height="10" fill="#37474f"/><rect x="77" y="299" width="10" height="10" fill="#eceff1"/>
  <rect x="87" y="299" width="10" height="10" fill="#37474f"/><rect x="97" y="299" width="10" height="10" fill="#eceff1"/>
  <text x="98" y="328" text-anchor="middle" fill="#eceff1" font-size="9">标定板 T</text>
  <text x="98" y="340" text-anchor="middle" fill="#78909c" font-size="8">固定不动</text>

  <!-- Table L -->
  <line x1="35" y1="340" x2="420" y2="340" stroke="#546e7a" stroke-width="3"/>

  <!-- T_WE arrow -->
  <line x1="204" y1="335" x2="275" y2="207" stroke="#64b5f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a1)"/>
  <text x="220" y="262" fill="#64b5f6" font-size="8" transform="rotate(-55,220,262)">T_WE (FK已知)</text>

  <!-- X = T_EC arrow -->
  <line x1="298" y1="190" x2="320" y2="178" stroke="#ef9a9a" stroke-width="2" marker-end="url(#a2)"/>
  <text x="355" y="166" text-anchor="middle" fill="#ef9a9a" font-size="9" font-weight="bold">X = T_EC</text>
  <text x="355" y="177" text-anchor="middle" fill="#ef9a9a" font-size="8">（唯一待求量）</text>

  <!-- T_CT camera observes target -->
  <line x1="318" y1="178" x2="128" y2="290" stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a3)"/>
  <text x="237" y="218" fill="#a5d6a7" font-size="8" transform="rotate(-32,237,218)">T_CT (观测已知)</text>

  <!-- Equation box L -->
  <rect x="35" y="94" width="225" height="80" rx="7" fill="#0a1929" stroke="#1565c0" stroke-width="1.5"/>
  <text x="147" y="114" text-anchor="middle" fill="#90caf9" font-size="11" font-weight="bold">求解方程：AX = XB</text>
  <text x="147" y="131" text-anchor="middle" fill="#ffe0b2" font-size="8.5">A = T_WE⁻¹(j)·T_WE(i)  (机器人运动量)</text>
  <text x="147" y="147" text-anchor="middle" fill="#ffe0b2" font-size="8.5">B = T_CT(i)·T_CT⁻¹(j)  (相机观测量)</text>
  <text x="147" y="164" text-anchor="middle" fill="#bbdefb" font-size="8.5">X = T_EC  (末端→相机，唯一未知)</text>

  <!-- Key insight L -->
  <rect x="35" y="185" width="225" height="50" rx="6" fill="#0a2a0a" stroke="#388e3c" stroke-width="1"/>
  <text x="147" y="204" text-anchor="middle" fill="#a5d6a7" font-size="9" font-weight="bold">约束：标定板相对世界静止不动</text>
  <text x="147" y="219" text-anchor="middle" fill="#c8e6c9" font-size="8">机械臂运动 n 次（n≥3），</text>
  <text x="147" y="232" text-anchor="middle" fill="#c8e6c9" font-size="8">多组方程联立求唯一解 X</text>

  <!-- RIGHT: Eye-to-Hand -->
  <rect x="465" y="44" width="415" height="390" rx="10" fill="#0d1f33" stroke="#F44336" stroke-width="2"/>
  <text x="672" y="68" text-anchor="middle" fill="#ef9a9a" font-size="13" font-weight="bold">Eye-to-Hand（固定式）</text>
  <text x="672" y="83" text-anchor="middle" fill="#546e7a" font-size="10">相机固定在外部支架，不随机械臂运动</text>

  <!-- Robot Base R -->
  <rect x="535" y="335" width="90" height="32" rx="5" fill="#b71c1c" stroke="#ef5350" stroke-width="1.5"/>
  <text x="580" y="356" text-anchor="middle" fill="#ffcdd2" font-size="10" font-weight="bold">Base W</text>

  <!-- Arm R -->
  <line x1="580" y1="335" x2="540" y2="260" stroke="#ef9a9a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="540" cy="260" r="5" fill="#ef5350"/>
  <line x1="540" y1="260" x2="500" y2="200" stroke="#ef9a9a" stroke-width="4" stroke-linecap="round"/>

  <!-- End-Effector R -->
  <rect x="476" y="181" width="56" height="26" rx="4" fill="#b71c1c" stroke="#ef5350" stroke-width="1.5"/>
  <text x="504" y="198" text-anchor="middle" fill="#ffcdd2" font-size="9" font-weight="bold">End-Eff E</text>

  <!-- Calibration Target on end-eff R -->
  <rect x="470" y="158" width="45" height="26" rx="4" fill="#263238" stroke="#90a4ae" stroke-width="1.5"/>
  <rect x="474" y="162" width="8" height="8" fill="#eceff1"/><rect x="482" y="162" width="8" height="8" fill="#37474f"/>
  <rect x="490" y="162" width="8" height="8" fill="#eceff1"/>
  <rect x="474" y="170" width="8" height="8" fill="#37474f"/><rect x="482" y="170" width="8" height="8" fill="#eceff1"/>
  <rect x="490" y="170" width="8" height="8" fill="#37474f"/>
  <text x="492" y="192" text-anchor="middle" fill="#eceff1" font-size="7">标定板T</text>
  <text x="492" y="202" text-anchor="middle" fill="#78909c" font-size="7">（装在末端）</text>

  <!-- Fixed Camera R -->
  <rect x="730" y="95" width="60" height="30" rx="4" fill="#1b5e20" stroke="#66bb6a" stroke-width="2"/>
  <text x="760" y="113" text-anchor="middle" fill="#c8e6c9" font-size="9" font-weight="bold">Camera C</text>
  <text x="760" y="122" text-anchor="middle" fill="#c8e6c9" font-size="7">（固定不动）</text>
  <line x1="760" y1="126" x2="760" y2="340" stroke="#455a64" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="743" y="337" width="34" height="8" rx="2" fill="#37474f"/>

  <!-- Object on table R -->
  <rect x="628" y="295" width="55" height="45" rx="4" fill="#e65100" fill-opacity="0.5" stroke="#ff9800" stroke-width="1.5"/>
  <text x="655" y="317" text-anchor="middle" fill="#ffe0b2" font-size="9">目标物体</text>
  <text x="655" y="330" text-anchor="middle" fill="#ffe0b2" font-size="8">Object</text>

  <!-- Table R -->
  <line x1="465" y1="340" x2="840" y2="340" stroke="#546e7a" stroke-width="3"/>

  <!-- T_WE R (FK known) -->
  <line x1="583" y1="335" x2="506" y2="202" stroke="#64b5f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a1)"/>
  <text x="525" y="260" fill="#64b5f6" font-size="8" transform="rotate(60,525,260)">T_WE (FK已知)</text>

  <!-- X = T_EW unknown -->
  <!-- Z = T_CW unknown -->
  <line x1="752" y1="112" x2="587" y2="340" stroke="#ef9a9a" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#a2)"/>
  <text x="700" y="198" fill="#ef9a9a" font-size="8" font-weight="bold" transform="rotate(65,700,198)">Z = T_CW（待求2）</text>

  <!-- T_CT observe calibration board on end-eff -->
  <line x1="743" y1="115" x2="514" y2="172" stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a3)"/>
  <text x="638" y="128" text-anchor="middle" fill="#a5d6a7" font-size="8">T_CT (观测标定板，已知)</text>

  <!-- Camera observes object -->
  <line x1="758" y1="126" x2="673" y2="295" stroke="#ffb74d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a4)"/>
  <text x="746" y="232" fill="#ffb74d" font-size="8" transform="rotate(72,746,232)">T_CO (观测物体)</text>

  <!-- Equation box R -->
  <rect x="475" y="94" width="245" height="82" rx="7" fill="#0a1929" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="597" y="114" text-anchor="middle" fill="#ef9a9a" font-size="11" font-weight="bold">求解方程：AX = ZB</text>
  <text x="597" y="131" text-anchor="middle" fill="#ffe0b2" font-size="8.5">A = T_WE(i)  (已知: FK正运动学)</text>
  <text x="597" y="147" text-anchor="middle" fill="#ffe0b2" font-size="8.5">B = T_CT(i)  (已知: 相机观测标定板)</text>
  <text x="597" y="163" text-anchor="middle" fill="#ef9a9a" font-size="8.5">X = T_EW  (末端→世界坐标，待求1)</text>
  <text x="597" y="178" text-anchor="middle" fill="#ef9a9a" font-size="8.5">Z = T_CW  (相机→世界坐标，待求2)</text>

  <!-- Key insight R -->
  <rect x="475" y="188" width="245" height="50" rx="6" fill="#2a0000" stroke="#b71c1c" stroke-width="1"/>
  <text x="597" y="207" text-anchor="middle" fill="#ef9a9a" font-size="9" font-weight="bold">约束：标定板随末端运动，相机固定</text>
  <text x="597" y="222" text-anchor="middle" fill="#ffcdd2" font-size="8">同时求解 X 和 Z 两个未知变换，</text>
  <text x="597" y="235" text-anchor="middle" fill="#ffcdd2" font-size="8">需至少 3 组不同末端位姿数据</text>

  <!-- Bottom bar -->
  <rect x="20" y="442" width="860" height="32" rx="7" fill="#1a2940" stroke="#263238" stroke-width="1"/>
  <text x="227" y="460" text-anchor="middle" fill="#64b5f6" font-size="9" font-weight="bold">AX = XB：1个未知量，Eye-in-Hand经典方程（X=Z特殊情况）</text>
  <line x1="454" y1="444" x2="454" y2="472" stroke="#37474f" stroke-width="1"/>
  <text x="672" y="460" text-anchor="middle" fill="#ef9a9a" font-size="9" font-weight="bold">AX = ZB：2个未知量，Eye-to-Hand通用方程（更一般情形）</text>
</svg>
