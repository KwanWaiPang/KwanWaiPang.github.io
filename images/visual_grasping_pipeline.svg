<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="320" fill="#0f1923" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#e0f0ff" font-size="16" font-weight="bold">机械臂视觉抓取整体技术路线</text>
  
  <!-- Step 1: RGB/D Camera Input -->
  <rect x="20" y="55" width="130" height="200" rx="10" fill="#1a2940" stroke="#2196F3" stroke-width="2"/>
  <text x="85" y="82" text-anchor="middle" fill="#64b5f6" font-size="12" font-weight="bold">传感器输入</text>
  <text x="85" y="100" text-anchor="middle" fill="#90caf9" font-size="10">RGB Camera</text>
  <rect x="40" y="108" width="90" height="50" rx="6" fill="#0d47a1" stroke="#42a5f5" stroke-width="1"/>
  <text x="85" y="128" text-anchor="middle" fill="#bbdefb" font-size="9">🎥 RGB Image</text>
  <text x="85" y="143" text-anchor="middle" fill="#bbdefb" font-size="9">640×480</text>
  <text x="85" y="175" text-anchor="middle" fill="#90caf9" font-size="10">RGBD Camera</text>
  <rect x="40" y="182" width="90" height="55" rx="6" fill="#0d47a1" stroke="#42a5f5" stroke-width="1"/>
  <text x="85" y="200" text-anchor="middle" fill="#bbdefb" font-size="9">🎥 RGB + Depth</text>
  <text x="85" y="215" text-anchor="middle" fill="#bbdefb" font-size="9">Intel RealSense</text>
  <text x="85" y="228" text-anchor="middle" fill="#bbdefb" font-size="9">Azure Kinect</text>
  <text x="85" y="248" text-anchor="middle" fill="#64b5f6" font-size="10" font-weight="bold">Step 0</text>

  <!-- Arrow 1 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#42a5f5"/>
    </marker>
  </defs>
  <line x1="150" y1="155" x2="170" y2="155" stroke="#42a5f5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Object Detection & Localization -->
  <rect x="170" y="55" width="140" height="200" rx="10" fill="#1a2940" stroke="#4CAF50" stroke-width="2"/>
  <text x="240" y="82" text-anchor="middle" fill="#81c784" font-size="12" font-weight="bold">目标检测与定位</text>
  <rect x="185" y="92" width="110" height="38" rx="5" fill="#1b5e20" stroke="#66bb6a" stroke-width="1"/>
  <text x="240" y="108" text-anchor="middle" fill="#c8e6c9" font-size="9">2D Detection</text>
  <text x="240" y="122" text-anchor="middle" fill="#c8e6c9" font-size="9">YOLO / DETR</text>
  <rect x="185" y="138" width="110" height="38" rx="5" fill="#1b5e20" stroke="#66bb6a" stroke-width="1"/>
  <text x="240" y="153" text-anchor="middle" fill="#c8e6c9" font-size="9">Instance Seg.</text>
  <text x="240" y="167" text-anchor="middle" fill="#c8e6c9" font-size="9">Mask R-CNN / SAM</text>
  <rect x="185" y="183" width="110" height="38" rx="5" fill="#1b5e20" stroke="#66bb6a" stroke-width="1"/>
  <text x="240" y="198" text-anchor="middle" fill="#c8e6c9" font-size="9">BBox + Class</text>
  <text x="240" y="212" text-anchor="middle" fill="#c8e6c9" font-size="9">Confidence Score</text>
  <text x="240" y="248" text-anchor="middle" fill="#81c784" font-size="10" font-weight="bold">Step 1</text>

  <!-- Arrow 2 -->
  <line x1="310" y1="155" x2="330" y2="155" stroke="#42a5f5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: 6D Pose Estimation -->
  <rect x="330" y="55" width="160" height="200" rx="10" fill="#1a2940" stroke="#FF9800" stroke-width="2"/>
  <text x="410" y="75" text-anchor="middle" fill="#ffb74d" font-size="12" font-weight="bold">6D 姿态估计</text>
  <text x="410" y="90" text-anchor="middle" fill="#ffe0b2" font-size="9">Object Pose: [R|t] ∈ SE(3)</text>
  <rect x="345" y="98" width="130" height="32" rx="5" fill="#e65100" fill-opacity="0.4" stroke="#fb8c00" stroke-width="1"/>
  <text x="410" y="112" text-anchor="middle" fill="#ffe0b2" font-size="9">RGB-based: MegaPose</text>
  <text x="410" y="124" text-anchor="middle" fill="#ffe0b2" font-size="9">Render &amp; Compare</text>
  <rect x="345" y="135" width="130" height="32" rx="5" fill="#e65100" fill-opacity="0.4" stroke="#fb8c00" stroke-width="1"/>
  <text x="410" y="149" text-anchor="middle" fill="#ffe0b2" font-size="9">RGBD: SAM-6D</text>
  <text x="410" y="161" text-anchor="middle" fill="#ffe0b2" font-size="9">ISM + PEM</text>
  <rect x="345" y="172" width="130" height="32" rx="5" fill="#e65100" fill-opacity="0.4" stroke="#fb8c00" stroke-width="1"/>
  <text x="410" y="186" text-anchor="middle" fill="#ffe0b2" font-size="9">Foundation: FoundationPose</text>
  <text x="410" y="198" text-anchor="middle" fill="#ffe0b2" font-size="9">Model-based &amp; Free</text>
  <rect x="345" y="209" width="130" height="28" rx="5" fill="#bf360c" fill-opacity="0.4" stroke="#ff7043" stroke-width="1"/>
  <text x="410" y="224" text-anchor="middle" fill="#ffccbc" font-size="9">Output: T_obj = [R|t]</text>
  <text x="410" y="248" text-anchor="middle" fill="#ffb74d" font-size="10" font-weight="bold">Step 2</text>

  <!-- Arrow 3 -->
  <line x1="490" y1="155" x2="510" y2="155" stroke="#42a5f5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Hand-Eye Calibration -->
  <rect x="510" y="55" width="140" height="200" rx="10" fill="#1a2940" stroke="#9C27B0" stroke-width="2"/>
  <text x="580" y="75" text-anchor="middle" fill="#ce93d8" font-size="12" font-weight="bold">手眼标定</text>
  <text x="580" y="90" text-anchor="middle" fill="#e1bee7" font-size="9">AX = XB</text>
  <rect x="525" y="98" width="110" height="38" rx="5" fill="#4a148c" fill-opacity="0.6" stroke="#ab47bc" stroke-width="1"/>
  <text x="580" y="113" text-anchor="middle" fill="#e1bee7" font-size="9">Eye-in-Hand</text>
  <text x="580" y="127" text-anchor="middle" fill="#e1bee7" font-size="9">Camera on End-Eff.</text>
  <rect x="525" y="142" width="110" height="38" rx="5" fill="#4a148c" fill-opacity="0.6" stroke="#ab47bc" stroke-width="1"/>
  <text x="580" y="157" text-anchor="middle" fill="#e1bee7" font-size="9">Eye-to-Hand</text>
  <text x="580" y="171" text-anchor="middle" fill="#e1bee7" font-size="9">Fixed Camera</text>
  <rect x="525" y="186" width="110" height="38" rx="5" fill="#4a148c" fill-opacity="0.6" stroke="#ab47bc" stroke-width="1"/>
  <text x="580" y="200" text-anchor="middle" fill="#e1bee7" font-size="9">T_cam→base</text>
  <text x="580" y="214" text-anchor="middle" fill="#e1bee7" font-size="9">Calib. Target</text>
  <text x="580" y="248" text-anchor="middle" fill="#ce93d8" font-size="10" font-weight="bold">Step 3</text>

  <!-- Arrow 4 -->
  <line x1="650" y1="155" x2="670" y2="155" stroke="#42a5f5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Motion Planning -->
  <rect x="670" y="55" width="150" height="200" rx="10" fill="#1a2940" stroke="#F44336" stroke-width="2"/>
  <text x="745" y="75" text-anchor="middle" fill="#ef9a9a" font-size="12" font-weight="bold">运动规划</text>
  <text x="745" y="90" text-anchor="middle" fill="#ffcdd2" font-size="9">MoveIt + OMPL</text>
  <rect x="685" y="97" width="120" height="32" rx="5" fill="#b71c1c" fill-opacity="0.5" stroke="#ef5350" stroke-width="1"/>
  <text x="745" y="111" text-anchor="middle" fill="#ffcdd2" font-size="9">RRT / RRT* / PRM</text>
  <text x="745" y="123" text-anchor="middle" fill="#ffcdd2" font-size="9">Sampling-based</text>
  <rect x="685" y="134" width="120" height="32" rx="5" fill="#b71c1c" fill-opacity="0.5" stroke="#ef5350" stroke-width="1"/>
  <text x="745" y="148" text-anchor="middle" fill="#ffcdd2" font-size="9">Collision Avoidance</text>
  <text x="745" y="160" text-anchor="middle" fill="#ffcdd2" font-size="9">FCL / Octomap</text>
  <rect x="685" y="171" width="120" height="32" rx="5" fill="#b71c1c" fill-opacity="0.5" stroke="#ef5350" stroke-width="1"/>
  <text x="745" y="185" text-anchor="middle" fill="#ffcdd2" font-size="9">Traj. Execution</text>
  <text x="745" y="197" text-anchor="middle" fill="#ffcdd2" font-size="9">ros2_control</text>
  <rect x="685" y="208" width="120" height="28" rx="5" fill="#b71c1c" fill-opacity="0.5" stroke="#ef5350" stroke-width="1"/>
  <text x="745" y="226" text-anchor="middle" fill="#ffcdd2" font-size="9">Grasp Execution 🤖</text>
  <text x="745" y="248" text-anchor="middle" fill="#ef9a9a" font-size="10" font-weight="bold">Step 4</text>

  <!-- Bottom label -->
  <text x="450" y="295" text-anchor="middle" fill="#546e7a" font-size="11">完整视觉抓取流水线: 感知 → 理解 → 标定 → 规划 → 执行</text>
</svg>
