<div class="site-avatar cobe-globe">
  <canvas id="cobe-globe-canvas" aria-label="Interactive globe"></canvas>
</div>

<script type="module">
  import createGlobe from 'https://cdn.jsdelivr.net/npm/cobe/+esm';

  const canvas = document.getElementById('cobe-globe-canvas');
  const container = canvas?.parentElement;

  if (canvas && container) {
    let phi = 0;
    let theta = 0.25;
    let isDragging = false;
    let lastPointerX = 0;
    let lastPointerY = 0;
    let globe = null;
    let resizeTimer = null;

    canvas.style.touchAction = 'none';
    canvas.style.cursor = 'grab';

    function measureSize() {
      const display = Math.round(container.getBoundingClientRect().width) || 200;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const px = Math.round(display * dpr);

      canvas.width = px;
      canvas.height = px;
      canvas.style.width = `${display}px`;
      canvas.style.height = `${display}px`;

      return { width: px, height: px, dpr };
    }

    function initGlobe() {
      if (globe) {
        globe.destroy();
      }

      const { width, height, dpr } = measureSize();

      globe = createGlobe(canvas, {
        devicePixelRatio: dpr,
        width,
        height,
        phi,
        theta,
        dark: 0,
        diffuse: 1.25,
        mapSamples: 16000,
        mapBrightness: 6,
        baseColor: [0.88, 0.9, 0.96],
        markerColor: [0.18, 0.42, 0.92],
        glowColor: [0.78, 0.86, 1],
        markers: [
          { location: [22.28, 114.15], size: 0.055 },
          { location: [39.9, 116.4], size: 0.04 },
          { location: [31.23, 121.47], size: 0.038 },
          { location: [37.78, -122.44], size: 0.032 },
          { location: [51.51, -0.13], size: 0.032 },
          { location: [35.68, 139.69], size: 0.032 },
          { location: [1.35, 103.82], size: 0.03 },
        ],
        arcs: [
          { from: [22.28, 114.15], to: [37.78, -122.44] },
          { from: [22.28, 114.15], to: [51.51, -0.13] },
          { from: [22.28, 114.15], to: [35.68, 139.69] },
        ],
        arcColor: [0.35, 0.55, 0.95],
        arcWidth: 0.35,
        arcHeight: 0.25,
        onRender: (state) => {
          if (!isDragging) {
            phi += 0.004;
          }
          state.phi = phi;
          state.theta = theta;
        },
      });
    }

    canvas.addEventListener('pointerdown', (event) => {
      isDragging = true;
      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
      canvas.style.cursor = 'grabbing';
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener('pointermove', (event) => {
      if (!isDragging) {
        return;
      }

      const deltaX = event.clientX - lastPointerX;
      const deltaY = event.clientY - lastPointerY;

      phi += deltaX * 0.005;
      theta = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, theta + deltaY * 0.005));

      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
    });

    function stopDragging() {
      isDragging = false;
      canvas.style.cursor = 'grab';
    }

    canvas.addEventListener('pointerup', stopDragging);
    canvas.addEventListener('pointercancel', stopDragging);

    requestAnimationFrame(initGlobe);

    new ResizeObserver(() => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(initGlobe, 150);
    }).observe(container);
  }
</script>
